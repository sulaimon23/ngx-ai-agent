name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Lint
        run: npm run lint

      - name: Build library
        run: npm run build:lib

      - name: Test
        run: npm run test -- --watch=false
